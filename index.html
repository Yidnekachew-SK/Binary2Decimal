<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="styles.css">
	<title>Binary2Decimal</title>
</head>
<body>
	<h1>Binary to Decimal converter</h1>
	<div class="container">
		<div class="input">
			<select id="number-type-selecter">
				<option value="binary">Binary number</option>
				<option value="decimal">Decimal number</option>
			</select>
			<input type="number" id="binary-input" name="binary" min="0" placeholder="1011">
		</div>

		<div class="display">
			<p id="number-type-displayer">Decimal number</p>
			<p class="result"> </p>
		</div>
	</div>
	<script src="converter.js"></script>
</body>
</html>
