<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="styles.css">
	<title>Binary2Decimal</title>
</head>
<body>
	<h1>Binary to Decimal converter</h1>
	<div class="container">
		<div class="input">
			<label for="binary-input">Binary digit</label>
			<input type="number" id="binary-input" name="binary" min="0" placeholder="1011">
		</div>

		<div class="display">
			<p>Decimal number</p>
			<p class="result"> </p>
		</div>
	</div>
	<script src="converter.js"></script>
</body>
</html>
